<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Compass — Find Your Path</title>
<meta name="description" content="Discover jobs and careers that actually suit you.">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#FAF7F2}#root{min-height:100vh}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;


// ─────────────────────────────────────────────
// COLOURS
// ─────────────────────────────────────────────
const C = {
  cream:"#FAF7F2", warm:"#FDF9F4", sand:"#E8DFD0",
  tc:"#C4714A", tcl:"#D98B65",
  gr:"#3D6B4F", grl:"#5A8F6E",
  bl:"#4A6CB8", bll:"#EEF2FC",
  pu:"#7C4DBC", pul:"#F0EBFA",
  ch:"#2C2C2C", mid:"#6B6560", lt:"#A09890",
};

// ─────────────────────────────────────────────
// PHASE DEFINITIONS  (used for progress + celebrations)
// ─────────────────────────────────────────────
const PHASES = [
  { id:"p1", label:"Who you are",       emoji:"🧭", color:C.tc,  desc:"Let's start with the basics — who you are right now." },
  { id:"p2", label:"What drives you",   emoji:"💡", color:C.gr,  desc:"Now let's dig into what lights you up and what you value." },
  { id:"p3", label:"How you work best", emoji:"⚡", color:C.bl,  desc:"Finally — the kind of environment where you'll thrive." },
];

// ─────────────────────────────────────────────
// ALL QUESTIONS  — 20 total across 3 phases
// Dr Chen: plain language, max 8 words per label,
//          workplace needs reframed as positive needs not deficits
// ─────────────────────────────────────────────
const ALL_QUESTIONS = [
  // ── PHASE 1 — WHO YOU ARE (7 questions) ──,

  { id:"name", phase:"p1", type:"text", single:true, label:"Let's begin",
    q:"What's your first name?",
    hint:"We'll use your name throughout to keep this personal.",
    ph:"Type your name here…" },

  { id:"age_bracket", phase:"p1", type:"options", label:"About you", cols:2,
    q:"Which age bracket are you in?",
    opts:[
      {v:"15_17", e:"🎒", l:"15–17",  d:"Still at school"},
      {v:"18_20", e:"🌱", l:"18–20",  d:"Just finished or recently left"},
      {v:"21_25", e:"🚀", l:"21–25",  d:"Early career or studying further"},
    ]},

  { id:"study", phase:"p1", type:"multi", label:"Right now", cols:1,
    q:"What are you up to at the moment?",
    hint:"Pick everything that applies to you.",
    opts:[
      {v:"highschool", e:"🎒", l:"I go to high school",          d:"Years 10, 11 or 12"},
      {v:"tafe",       e:"🔧", l:"I study at TAFE",              d:"Cert, diploma or trade"},
      {v:"uni",        e:"📚", l:"I go to university",           d:"Degree or diploma"},
      {v:"working",    e:"💼", l:"I already have a job",         d:"Part-time, casual or full-time"},
      {v:"gap",        e:"🌏", l:"Gap year or taking a break",   d:"Travelling or time out"},
      {v:"none",       e:"🔍", l:"Not studying or working yet",  d:"Looking for my first step"},
    ]},

  { id:"goal", phase:"p1", type:"path", label:"Your goal",
    q:"What would you like help with today?",
    hint:"You can pick more than one — or say you're not sure." },

  { id:"environment", phase:"p1", type:"multi", label:"Where you work", cols:2,
    q:"Where would you love to spend your day?",
    hint:"Pick all that feel good to you.",
    opts:[
      {v:"outdoors", e:"🌿", l:"Outside",       d:"Fresh air, on the move"},
      {v:"indoor",   e:"🏢", l:"Inside",         d:"Office, building or shop"},
      {v:"travel",   e:"🚗", l:"On the road",    d:"Driving, visiting places"},
      {v:"home",     e:"🏡", l:"From home",      d:"Flexible, computer-based"},
    ]},

  { id:"interests", phase:"p1", type:"multi", label:"What you enjoy", cols:2,
    q:"What genuinely excites you?",
    hint:"Pick all that light you up — even a little.",
    opts:[
      {v:"tech",     e:"💻", l:"Tech and computers",  d:"Apps, games, digital"},
      {v:"creative", e:"🎨", l:"Art and creativity",  d:"Design, music, making"},
      {v:"nature",   e:"🌱", l:"Nature and animals",  d:"Outdoors, environment"},
      {v:"caring",   e:"❤️",  l:"Helping people",      d:"Health, support, community"},
      {v:"building", e:"🔨", l:"Building and fixing",  d:"Trades, hands-on work"},
      {v:"business", e:"📈", l:"Business and money",   d:"Sales, finance, strategy"},
    ]},

  { id:"challenge", phase:"p1", type:"options", label:"Work style", cols:1,
    q:"Which of these sounds most like you?",
    opts:[
      {v:"simple",   e:"🌊", l:"I like simple, clear jobs",    d:"I want to know exactly what to do"},
      {v:"moderate", e:"⚡", l:"I like some challenge",        d:"Grow, but not be overwhelmed"},
      {v:"complex",  e:"🔬", l:"I love hard problems",         d:"The more complex, the better"},
    ]},

  // ── PHASE 2 — WHAT DRIVES YOU (7 questions) ──,


  // ── PHASE 2 — WHAT DRIVES YOU (7 questions) ──,

  { id:"strength", phase:"p2", type:"options", label:"Your superpower", cols:1,
    q:"Which of these sounds most like you?",
    opts:[
      {v:"hands",     e:"🔨", l:"I'm good with my hands",      d:"Building, fixing, making things"},
      {v:"people",    e:"🤝", l:"I'm good with people",        d:"Talking, listening, helping"},
      {v:"ideas",     e:"💡", l:"I come up with good ideas",   d:"Creative, inventive, imaginative"},
      {v:"detail",    e:"🔍", l:"I notice the small things",   d:"Careful, accurate, thorough"},
      {v:"physical",  e:"💪", l:"I'm active and physical",     d:"Energy, sport, movement"},
    ]},

  // ── PHASE 3 — HOW YOU WORK BEST (6 questions) ──,

  { id:"learning", phase:"p2", type:"options", label:"How you learn", cols:1,
    q:"How do you pick up new things best?",
    hint:"Think about when you've learned something well.",
    opts:[
      {v:"watching",  e:"👀", l:"Watching someone first",      d:"See it done, then try it"},
      {v:"doing",     e:"🔨", l:"Just having a go",            d:"Learn by doing, trial and error"},
      {v:"reading",   e:"📖", l:"Reading or watching videos",  d:"Study, research, online guides"},
      {v:"asking",    e:"💬", l:"Asking lots of questions",    d:"Talk it through with someone"},
    ]},

  { id:"motivation", phase:"p2", type:"options", label:"What gets you going", cols:1,
    q:"What makes you feel proud at the end of a day?",
    opts:[
      {v:"helped",    e:"🤗", l:"I helped someone",            d:"Made a real difference to a person"},
      {v:"built",     e:"🔨", l:"I made or built something",   d:"Created something with my hands or mind"},
      {v:"learned",   e:"🧠", l:"I learned something new",     d:"Grew my skills or knowledge"},
      {v:"earned",    e:"💵", l:"I earned good money",         d:"Financially rewarded for my effort"},
      {v:"solved",    e:"💡", l:"I solved a problem",          d:"Figured something out, fixed something"},
    ]},

  { id:"good_day", phase:"p2", type:"options", label:"Your ideal day", cols:1,
    q:"What does a really good work day look like for you?",
    opts:[
      {v:"routine",   e:"📅", l:"I nailed my routine tasks",   d:"Everything done, nothing surprising"},
      {v:"created",   e:"✨", l:"I made something I'm proud of",d:"Creative output, visible result"},
      {v:"team_win",  e:"🏆", l:"We achieved something as a team",d:"Collaboration, shared success"},
      {v:"helped_day",e:"💬", l:"I really helped someone",     d:"A person was better off because of me"},
      {v:"learned_day",e:"📚",l:"I picked up a new skill",     d:"Growth, progress, discovery"},
    ]},

  { id:"success_vision", phase:"p2", type:"options", label:"Your future", cols:1,
    q:"In 5 years, what would feel like success to you?",
    hint:"Go with your gut — there's no right answer.",
    opts:[
      {v:"own_biz",   e:"🏪", l:"Running my own business",     d:"Being my own boss"},
      {v:"expert",    e:"🏆", l:"Being really good at my craft",d:"The best in my field"},
      {v:"stable",    e:"🏠", l:"A stable job I enjoy",        d:"Reliable income, life balance"},
      {v:"impact",    e:"🌍", l:"Making a real difference",    d:"Changing things for the better"},
      {v:"leader",    e:"🧭", l:"Leading a team",              d:"Managing and inspiring others"},
      {v:"unsure",    e:"🤷", l:"Honestly, I'm not sure yet",  d:"Still figuring it out — that's OK"},
    ]},

  { id:"values", phase:"p2", type:"multi", label:"What matters to you", cols:1,
    q:"What matters most to you in a job?",
    hint:"Pick your top 3 — the things you really can't do without.",
    max:3,
    opts:[
      {v:"money",     e:"💰", l:"Good pay",                    d:"Earning well, financial security"},
      {v:"purpose",   e:"🌍", l:"Doing something meaningful",  d:"Work that makes a difference"},
      {v:"growth",    e:"📈", l:"Learning and growing",        d:"Getting better, new skills"},
      {v:"flexible",  e:"🕐", l:"Flexibility and freedom",     d:"Control of my own time"},
      {v:"creative",  e:"🎨", l:"Being creative",              d:"Making, inventing, expressing"},
      {v:"stability", e:"🏠", l:"Job security",                d:"Steady, reliable work"},
      {v:"social",    e:"🤝", l:"Great people around me",      d:"Good team, good culture"},
      {v:"variety",   e:"🔄", l:"Variety and change",          d:"No two days the same"},
    ]},

  { id:"people", phase:"p2", type:"multi", label:"How you work with others", cols:2,
    q:"How do you prefer to work with people?",
    hint:"Pick all that feel natural.",
    opts:[
      {v:"solo",      e:"🎧", l:"On my own",                   d:"Focused, independent"},
      {v:"team",      e:"🤝", l:"In a team",                   d:"Social, collaborative"},
      {v:"lead",      e:"🧭", l:"Leading others",              d:"Organising, making decisions"},
      {v:"helping",   e:"💬", l:"Helping people directly",     d:"Customers, clients, community"},
    ]},


  // ── PHASE 3 — HOW YOU WORK BEST (5 questions) ──,

  { id:"feedback", phase:"p3", type:"options", label:"Feedback style", cols:1,
    q:"What kind of feedback helps you do your best work?",
    hint:"Think about when you've thrived — what did the people around you do?",
    opts:[
      {v:"nurture",   e:"🌱", l:"Lots of encouragement",       d:"I do best with warmth and patience"},
      {v:"balanced",  e:"⚖️",  l:"A mix of praise and honesty", d:"Some positive, some constructive"},
      {v:"direct",    e:"🎯", l:"Just tell me straight",        d:"Direct, honest — no fluff"},
      {v:"self",      e:"🔍", l:"I assess myself",              d:"I know how I'm going without being told"},
    ]},

  { id:"supervision", phase:"p3", type:"options", label:"Direction needed", cols:1,
    q:"What kind of guidance do you work best with?",
    opts:[
      {v:"lots",      e:"🗺️",  l:"Clear steps and check-ins",  d:"I like knowing exactly what to do"},
      {v:"some",      e:"📋", l:"Point me at the goal",        d:"Tell me what's needed, I'll figure how"},
      {v:"minimal",   e:"🦅", l:"Trust me and step back",      d:"I work best with full independence"},
    ]},

  // Dr Chen: reframed from "what's hard" to "what do you need"
  // Split into two focused questions instead of one overwhelming list,

  { id:"workplace_vibe", phase:"p3", type:"options", label:"Workplace vibe", cols:1,
    q:"Which workplace feels most like where you'd thrive?",
    hint:"Pick the one that genuinely appeals to you most.",
    opts:[
      {v:"calm_sup",  e:"🌿", l:"Calm, supportive team",       d:"Low pressure, people look out for each other"},
      {v:"busy_fun",  e:"🎉", l:"Busy but fun",                d:"Fast-paced but friendly and upbeat"},
      {v:"quiet_ind", e:"🎧", l:"Quiet and independent",       d:"Let me focus without interruption"},
      {v:"high_ach",  e:"🏆", l:"High-achieving and driven",   d:"Ambitious, results-focused team"},
    ]},

  { id:"work_needs", phase:"p3", type:"options", label:"Your top need", cols:1,
    q:"Which of these matters most to you in a workplace?",
    hint:"Pick the single most important one.",
    opts:[
      {v:"kind_mgr",  e:"😊", l:"A kind, patient manager",     d:"Someone who supports and encourages me"},
      {v:"clear_exp", e:"📋", l:"Clear expectations",          d:"Always know what's expected of me"},
      {v:"no_judge",  e:"🛡️",  l:"A safe place to make mistakes",d:"Learn without fear of public criticism"},
      {v:"move",      e:"🚶", l:"Ability to move around",      d:"Not stuck at a desk all day"},
      {v:"autonomy",  e:"🦅", l:"Freedom to do it my way",     d:"Trusted to work independently"},
    ]},

  { id:"deal_one", phase:"p3", type:"options", label:"The big one", cols:1,
    q:"If a job had just ONE of these problems, which would bother you most?",
    hint:"Pick the one that would make it hardest to show up each day.",
    opts:[
      {v:"competitive",e:"🏆",l:"Constant competition with workmates", d:"Always being compared or ranked"},
      {v:"criticism",  e:"💬",l:"Harsh criticism in front of others",  d:"Being corrected or embarrassed publicly"},
      {v:"chaos",      e:"🌀",l:"Unpredictable, chaotic days",         d:"Never knowing what's coming"},
      {v:"isolation",  e:"🚪",l:"Working completely alone",            d:"No people, no conversation"},
      {v:"pressure",   e:"⏱️", l:"Relentless deadlines",               d:"Always rushing, constant stress"},
    ]}
];

// ─────────────────────────────────────────────
// INTEREST → FOLLOW-UP (adaptive, instant)
// ─────────────────────────────────────────────
function buildAdaptiveQ(interests = []) {
  if (interests.includes("tech"))
    return {id:"int_detail",phase:"p2",type:"options",cols:1,q:"What do you like doing with tech?",opts:[
      {v:"games",  e:"🎮",l:"Playing or making games",  d:"Gaming, design, animation"},
      {v:"fix",    e:"🛠️",l:"Fixing devices",            d:"Hardware, IT support"},
      {v:"build",  e:"💻",l:"Building apps or websites", d:"Coding, software"},
      {v:"data",   e:"📊",l:"Working with data",         d:"Analysis, spreadsheets"},
      {v:"any",    e:"🤷",l:"I just like tech stuff",    d:"Not sure of the specifics yet"},
    ]};
  if (interests.includes("creative"))
    return {id:"int_detail",phase:"p2",type:"options",cols:1,q:"What kind of creative work appeals to you?",opts:[
      {v:"visual", e:"🎨",l:"Drawing and visual art",  d:"Illustration, graphics"},
      {v:"music",  e:"🎵",l:"Music",                    d:"Playing, producing, singing"},
      {v:"writing",e:"✍️", l:"Writing",                 d:"Stories, content, copywriting"},
      {v:"video",  e:"🎬",l:"Video and film",           d:"Filming, editing, photography"},
      {v:"fashion",e:"👗",l:"Fashion and style",        d:"Clothing, design, beauty"},
    ]};
  if (interests.includes("building"))
    return {id:"int_detail",phase:"p2",type:"options",cols:1,q:"What kind of hands-on work appeals most?",opts:[
      {v:"electric",  e:"⚡",l:"Electrical",             d:"Electrician, solar, wiring"},
      {v:"plumb",     e:"🔧",l:"Plumbing",               d:"Pipes, hot water, drainage"},
      {v:"carpentry", e:"🪚",l:"Carpentry and building", d:"Wood, construction, joinery"},
      {v:"mechanic",  e:"🚗",l:"Mechanics and engines",  d:"Cars, motorbikes, machinery"},
      {v:"landscape", e:"🌿",l:"Landscaping and grounds",d:"Gardens, lawns, earthworks"},
    ]};
  if (interests.includes("caring"))
    return {id:"int_detail",phase:"p2",type:"options",cols:1,q:"Who would you most like to help?",opts:[
      {v:"kids",    e:"👧",l:"Kids and young people",  d:"Childcare, teaching, youth work"},
      {v:"elderly", e:"👴",l:"Older people",            d:"Aged care, companionship"},
      {v:"health",  e:"🏥",l:"Health and medical",     d:"Nursing, allied health"},
      {v:"mental",  e:"🧠",l:"Mental health",          d:"Counselling, social work"},
      {v:"animals", e:"🐾",l:"Animals",                d:"Vet nursing, animal care"},
    ]};
  if (interests.includes("nature"))
    return {id:"int_detail",phase:"p2",type:"options",cols:1,q:"What kind of outdoor work sounds good?",opts:[
      {v:"farm",    e:"🌾",l:"Farming and agriculture", d:"Crops, livestock, rural work"},
      {v:"parks",   e:"🏞️",l:"Parks and conservation", d:"Ranger, wildlife, environment"},
      {v:"land",    e:"🚜",l:"Land and earthworks",    d:"Machinery, landscaping"},
      {v:"sea",     e:"🌊",l:"Water and marine",       d:"Fishing, maritime"},
      {v:"science", e:"🔬",l:"Environmental science",  d:"Testing, research"},
    ]};
  return {id:"int_detail",phase:"p2",type:"options",cols:1,q:"What kind of work day appeals most?",opts:[
    {v:"routine",  e:"📅",l:"Same reliable routine",      d:"Predictable, clear tasks"},
    {v:"variety",  e:"🔄",l:"Something different daily",  d:"Varied and interesting"},
    {v:"project",  e:"🎯",l:"Working toward big goals",   d:"Targets, milestones, outcomes"},
    {v:"customer", e:"💬",l:"Talking to customers",       d:"Sales, service, relationships"},
    {v:"behind",   e:"🖥️",l:"Behind the scenes",          d:"Systems, operations, admin"},
  ]};
}

// ─────────────────────────────────────────────
// PHASE CELEBRATION SCREEN  (shown between phases)
// ─────────────────────────────────────────────
function PhaseCelebration({ phase, name, onContinue }) {
  const next = PHASES[PHASES.findIndex(p => p.id === phase.id) + 1];
  return (
    <div style={{textAlign:"center", padding:"16px 0 20px"}}>
      <div style={{fontSize:52, marginBottom:14}}>{phase.emoji}</div>
      <h2 style={{fontFamily:"'Fraunces',serif", fontSize:"clamp(18px,3vw,26px)", fontWeight:400, marginBottom:10, color:C.ch}}>
        Phase {PHASES.findIndex(p=>p.id===phase.id)+1} complete!
      </h2>
      <p style={{fontSize:14, color:C.mid, lineHeight:1.6, maxWidth:340, margin:"0 auto 20px"}}>
        You've told us <strong>{phase.label.toLowerCase()}</strong>. Great work, {name||"Explorer"} — you're doing brilliantly.
      </p>
      {next && (
        <div style={{background:C.warm, border:`1.5px solid ${C.sand}`, borderRadius:14, padding:"14px 16px", maxWidth:340, margin:"0 auto 22px", textAlign:"left"}}>
          <div style={{fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:C.lt, marginBottom:6}}>Up next</div>
          <div style={{fontSize:22, marginBottom:5}}>{next.emoji}</div>
          <div style={{fontFamily:"'Fraunces',serif", fontSize:17, fontWeight:400, marginBottom:4}}>{next.label}</div>
          <div style={{fontSize:13, color:C.mid}}>{next.desc}</div>
        </div>
      )}
      <button onClick={onContinue} style={{background:C.tc, color:"#fff", border:"none", borderRadius:50, padding:"13px 30px", fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"'DM Sans',sans-serif"}}>
        {next ? `Let's do ${next.label} →` : "Get my results →"}
      </button>
    </div>
  );
}

// ─────────────────────────────────────────────
// OPTION BUTTON
// ─────────────────────────────────────────────
function OptBtn({ opt, selected, onClick }) {
  return (
    <button onClick={() => onClick(opt.v)} style={{
      background: selected ? "#FEF3EC" : C.warm,
      border: `2px solid ${selected ? C.tc : C.sand}`,
      borderRadius:12, padding:"11px 13px", textAlign:"left", cursor:"pointer",
      fontFamily:"'DM Sans',sans-serif", fontSize:14, color:C.ch, lineHeight:1.4,
      position:"relative", transition:"all 0.15s", minHeight:50, width:"100%",
      boxShadow: selected ? "0 0 0 3px rgba(196,113,74,0.12)" : "none",
    }}>
      <span style={{fontSize:17, display:"block", marginBottom:3}}>{opt.e}</span>
      <span style={{fontWeight:600, display:"block"}}>{opt.l}</span>
      <span style={{fontSize:11, color:C.lt, display:"block", marginTop:1}}>{opt.d}</span>
      {selected && <span style={{position:"absolute", top:8, right:9, width:17, height:17, background:C.tc, color:"#fff", borderRadius:"50%", fontSize:9, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center"}}>✓</span>}
    </button>
  );
}

// ─────────────────────────────────────────────
// JOB CARD
// ─────────────────────────────────────────────
function JobCard({ job, rank, type }) {
  const pips = Math.min(5, Math.max(1, job.matchPips || 4));
  const labels = {strong:"Strong match", good:"Good match", "worth exploring":"Worth exploring"};
  const word = labels[job.matchLevel] || job.matchLevel || "Good match";
  return (
    <div style={{background:C.warm, border:`1.5px solid ${C.sand}`, borderRadius:14, padding:"16px 18px", marginBottom:10, position:"relative"}}>
      <span style={{position:"absolute", top:10, right:14, fontFamily:"'Fraunces',serif", fontSize:24, fontWeight:300, color:C.sand}}>{rank}</span>
      <h4 style={{fontFamily:"'Fraunces',serif", fontSize:17, fontWeight:400, marginBottom:5, paddingRight:26}}>{job.title}</h4>
      <p style={{fontSize:14, color:C.mid, lineHeight:1.6, marginBottom:7}}>{job.desc}</p>
      {job.whyYou && <p style={{fontSize:13, color:C.gr, background:"#EFF7F2", borderRadius:7, padding:"5px 10px", marginBottom:7, lineHeight:1.5, fontStyle:"italic"}}>{job.whyYou}</p>}
      {job.envFit && <div style={{fontSize:13, color:C.bl, background:C.bll, borderRadius:7, padding:"5px 10px", marginBottom:7, lineHeight:1.5}}>🏠 {job.envFit}</div>}
      {job.pathway && job.pathway.length > 0 && (
        <div style={{margin:"7px 0", padding:"10px 12px", background:"#fff", border:`1px solid ${C.sand}`, borderRadius:9}}>
          <div style={{fontSize:10, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", color:C.lt, marginBottom:7}}>How to get there</div>
          {job.pathway.map((step, i) => (
            <div key={i} style={{display:"flex", alignItems:"flex-start", gap:8, fontSize:13, color:C.mid, marginBottom:5, lineHeight:1.45}}>
              <span style={{width:16, height:16, borderRadius:"50%", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:700, color:"#fff", marginTop:1, background: type==="now" ? C.gr : C.tc}}>{i+1}</span>
              <span>{step}</span>
            </div>
          ))}
        </div>
      )}
      {job.tags && <div style={{display:"flex", flexWrap:"wrap", gap:4, margin:"6px 0"}}>{job.tags.map((t,i) => <span key={i} style={{fontSize:11, background:C.sand, color:C.mid, padding:"2px 8px", borderRadius:20}}>{t}</span>)}</div>}
      <div style={{display:"flex", alignItems:"center", gap:8, marginTop:7}}>
        <div style={{display:"flex", gap:3}}>
          {Array.from({length:5}).map((_,i) => <div key={i} style={{width:15, height:5, borderRadius:3, background: i<pips ? (type==="now"?C.gr:C.tc) : C.sand}} />)}
        </div>
        <span style={{fontSize:12, fontWeight:700, color: type==="now" ? C.gr : C.tc}}>{word}</span>
      </div>
      {job.thisWeek && <div style={{marginTop:8, fontSize:13, color:C.mid, borderTop:`1px solid ${C.sand}`, paddingTop:7, lineHeight:1.5}}><strong style={{color:C.tc}}>This week:</strong> {job.thisWeek}</div>}
    </div>
  );
}

// ─────────────────────────────────────────────
// THINKING DOTS
// ─────────────────────────────────────────────
function ThinkDots() {
  return (
    <div style={{display:"flex", justifyContent:"center", gap:7, marginBottom:14}}>
      {[C.tc, C.tcl, C.grl].map((col,i) => (
        <div key={i} style={{width:9, height:9, borderRadius:"50%", background:col, animation:`bounce 1.2s ease-in-out ${i*0.2}s infinite`}} />
      ))}
      <style>{`@keyframes bounce{0%,80%,100%{transform:scale(.65);opacity:.5}40%{transform:scale(1.05);opacity:1}}`}</style>
    </div>
  );
}

// ─────────────────────────────────────────────
// PROGRESS BAR
// ─────────────────────────────────────────────
function ProgBar({ pct, label, step, total }) {
  return (
    <div style={{marginBottom:4}}>
      <div style={{display:"flex", justifyContent:"space-between", fontSize:11, letterSpacing:"0.08em", textTransform:"uppercase", color:C.lt, marginBottom:5}}>
        <span>{label}</span><span />
      </div>
      <div style={{height:8, background:C.sand, borderRadius:8, overflow:"hidden", marginBottom:5}}>
        <div style={{height:"100%", background:`linear-gradient(90deg,${C.tc},${C.tcl})`, borderRadius:8, width:pct+"%", transition:"width 0.5s ease"}} />
      </div>
      <div style={{textAlign:"center", fontSize:12, color:C.lt, marginBottom:20}}>
        {step && total ? <>Step <strong style={{color:C.mid}}>{step}</strong> of <strong style={{color:C.mid}}>{total}</strong></> : null}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// SHELL — shared header + card wrapper
// ─────────────────────────────────────────────
function Shell({ children, showHeader=true }) {
  return (
    <div style={{background:C.cream, minHeight:"100vh", fontFamily:"'DM Sans',sans-serif", display:"flex", flexDirection:"column", alignItems:"center"}}>
      <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
      {showHeader && (
        <header style={{width:"100%", textAlign:"center", padding:"32px 24px 18px"}}>
          <div style={{display:"inline-flex", alignItems:"center", gap:10, marginBottom:10}}>
            <div style={{width:30, height:30, border:`2px solid ${C.tc}`, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color:C.tc}}>◈</div>
            <span style={{fontFamily:"'Fraunces',serif", fontSize:13, letterSpacing:"0.12em", textTransform:"uppercase", color:C.mid}}>Career Compass</span>
          </div>
          <h1 style={{fontFamily:"'Fraunces',serif", fontSize:"clamp(24px,5vw,44px)", fontWeight:300, lineHeight:1.1, maxWidth:520, margin:"0 auto 8px"}}>
            Find your <em style={{fontStyle:"italic", color:C.tc}}>path</em>
          </h1>
          <p style={{fontSize:14, color:C.mid, fontWeight:300, maxWidth:340, margin:"0 auto", lineHeight:1.6}}>
            Answer a few questions and we'll match you to jobs and careers that actually suit you.
          </p>
        </header>
      )}
      <div style={{width:"100%", maxWidth:640, padding:"0 16px 48px"}}>
        <div style={{background:"#fff", borderRadius:22, padding:"28px 30px", boxShadow:"0 4px 24px rgba(44,44,44,.09)", position:"relative", overflow:"hidden"}}>
          <div style={{position:"absolute", top:0, left:0, right:0, height:3, background:`linear-gradient(90deg,${C.tc},${C.grl})`}} />
          {children}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────
export default function CareerCompass() {
  // Scroll to top on every navigation
  function scrollToTop() {
    try { window.scrollTo({top:0, behavior:"instant"}); } catch(e) {}
  }

  // Build full question list with adaptive inserted after interests
  const [answers, setAnswers] = useState({});
  const [qList, setQList] = useState(ALL_QUESTIONS);
  const [qIdx, setQIdx] = useState(-1); // -1 = safe screen
  const [showCelebration, setShowCelebration] = useState(null); // phase id
  const [phase, setPhase] = useState("safe"); // safe|questions|celebration|thinking|results|error
  const [results, setResults] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");
  const [thinkMsg, setThinkMsg] = useState("Reading your answers…");

  // Per-question input state
  const [textVal, setTextVal] = useState("");
  const [multiSel, setMultiSel] = useState({});
  const [singleSel, setSingleSel] = useState(null);
  const [pathSel, setPathSel] = useState({});

  const name = answers.name || "Explorer";
  const TOTAL = qList.length;

  function resetInput() { setTextVal(""); setMultiSel({}); setSingleSel(null); setPathSel({}); }

  // ── Start fresh ──
  function startApp() {
    setAnswers({}); setQList(ALL_QUESTIONS);
    setQIdx(-1); setResults(null); setErrorMsg("");
    setPhase("safe"); resetInput(); scrollToTop();
  }

  // ── Navigate to question index ──
  function goTo(idx) { resetInput(); setQIdx(idx); setPhase("questions"); scrollToTop(); }

  // ── Save answer and advance ──
  function saveAndAdvance(qId, val) {
    const newAns = { ...answers, [qId]: val };
    setAnswers(newAns);

    // After interests, inject adaptive question
    let list = qList;
    if (qId === "interests" && !qList.find(q => q.id === "int_detail")) {
      const aq = buildAdaptiveQ(Array.isArray(val) ? val : [val]);
      const insertAt = qList.findIndex(q => q.id === "interests") + 1;
      list = [...qList.slice(0, insertAt), aq, ...qList.slice(insertAt)];
      setQList(list);
    }

    const next = qIdx + 1;

    // Check if we're crossing a phase boundary
    if (next < list.length) {
      const currentPhase = list[qIdx].phase;
      const nextPhase = list[next].phase;
      if (currentPhase && nextPhase && currentPhase !== nextPhase) {
        // Show celebration before moving to next phase
        scrollToTop();
        setShowCelebration(currentPhase);
        setAnswers(newAns);
        setPhase("celebration");
        return;
      }
      goTo(next);
    } else {
      // All questions done — generate results
      runResults(newAns, list);
    }
  }

  // ── After celebration, continue ──
  function afterCelebration() {
    scrollToTop();
    const next = qIdx + 1;
    if (next >= qList.length) {
      runResults(answers, qList);
    } else {
      goTo(next);
    }
  }

  // ── API call ──
  function runResults(ans, list) {
    scrollToTop();
    setPhase("thinking");
    const stages = ["Matching your strengths to roles…","Building your step-by-step pathways…","Almost ready!"];
    let i = 0;
    const iv = setInterval(() => {
      i++;
      if (i < stages.length) setThinkMsg(stages[i]);
      else { setThinkMsg("Just a few more seconds…"); clearInterval(iv); }
    }, 5000);

    const a = ans;
    const wN = Array.isArray(a.goal) && a.goal.includes("now");
    const wC = Array.isArray(a.goal) && a.goal.includes("career");
    const simple = a.challenge === "simple";

    const sys = `Career advisor for young Australians 15-25. Call them "Explorers" not users. Philosophy: Honest Hope — realistic AND genuinely encouraging.
${simple ? "SIMPLE MODE: max 10 words per sentence, plain everyday words, hands-on concrete roles only." : ""}
Return ONLY valid JSON, zero markdown:
{"encouragement":"1 warm sentence specific to this Explorer","summary":"1 sentence with their name","nowJobs":[2 job objects],"careerJobs":[2 job objects],"tips":["tip1","tip2"]}
Job: {"title":"","desc":"1 sentence","whyYou":"You'd be great here because...","pathway":["Now","3 months","1 year"],"tags":["","",""],"matchLevel":"strong|good|worth exploring","matchPips":3-5,"thisWeek":"specific action on seek.com.au","envFit":"1 sentence on environment fit"}
Include nowJobs only if wantsNow=true. Include careerJobs only if wantsCareer=true.
ENVIRONMENT FIT — use these as hard filters:
- feedback=${a.feedback||"balanced"}: nurture=supportive cultures only; direct=can handle high-performance
- supervision=${a.supervision||"some"}: lots=structured check-ins, no solo/freelance; minimal=high autonomy roles
- workplace_vibe=${a.workplace_vibe||""}: match culture carefully
- work_needs=${a.work_needs||""}: respect top need
- deal_one=${a.deal_one||""}: NEVER suggest roles that have this problem
  competitive→no KPI sales; criticism→no professional kitchens; chaos→no crisis/emergency roles;
  isolation→no remote-only; pressure→no finance deadlines or emergency services
Trades and hands-on roles = equal to professional paths. Normalise not knowing for under-20s.`;

    const extra = {};
    list.forEach(q => { if (ans[q.id] !== undefined) extra[q.id] = ans[q.id]; });

    const userMsg = `${a.name||"Explorer"}, age bracket: ${a.age_bracket||"15-25"}.
Study: ${JSON.stringify(a.study)}
Goals: ${JSON.stringify(a.goal)} wantsNow:${wN} wantsCareer:${wC}
Environment: ${JSON.stringify(a.environment)}
Interests: ${JSON.stringify(a.interests)}
Int detail: ${a.int_detail||""}
Challenge: ${a.challenge||"moderate"}
Values (top 3): ${JSON.stringify(a.values)}
Motivation: ${a.motivation||""}
Success vision: ${a.success_vision||""}
Good day: ${a.good_day||""}
People style: ${JSON.stringify(a.people)}
Learning style: ${a.learning||""}
Strength: ${a.strength||""}
Feedback: ${a.feedback||"balanced"}
Supervision: ${a.supervision||"some"}
Workplace vibe: ${a.workplace_vibe||""}
Top work need: ${a.work_needs||""}
Biggest dealbreaker: ${a.deal_one||""}`;

    fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1400,
        system:sys,
        messages:[{role:"user",content:userMsg}]
      })
    })
    .then(r => {
      if (!r.ok) return r.json().then(e => { throw new Error((e.error&&e.error.message)||r.statusText); });
      return r.json();
    })
    .then(d => {
      clearInterval(iv);
      const raw = d.content.map(b=>b.text||"").join("").replace(/```json\s*/g,"").replace(/```/g,"").trim();
      const result = JSON.parse(raw);
      scrollToTop();
      setResults({...result, wN, wC});
      setPhase("results");
    })
    .catch(e => { clearInterval(iv); scrollToTop(); setErrorMsg(e.message); setPhase("error"); });
  }

  // ─────────────────────────────────────────────
  // RENDER QUESTION BODY
  // ─────────────────────────────────────────────
  function renderQBody(q, onNext, onBack) {
    const opts = q.opts || [];
    const cols = q.cols || 1;
    const maxSel = q.max || 99;

    if (q.type === "path") {
      const ckCol = {now:C.tc, career:C.gr, unsure:C.bl};
      const cards = [
        {key:"now",    icon:"💵", title:"A part-time job now",    desc:"Start earning soon while I study or figure things out."},
        {key:"career", icon:"🚀", title:"A future career path",   desc:"Explore where I could go and how to get there step by step."},
        {key:"unsure", icon:"🤷", title:"Not sure yet",           desc:"Help me figure out what might suit me — show me both."},
      ];
      const toggle = key => {
        if (key==="unsure") { setPathSel(prev => ({unsure:!prev.unsure})); }
        else { setPathSel(prev => { const n={...prev}; delete n.unsure; n[key]?delete n[key]:n[key]=true; return n; }); }
      };
      const hasAny = Object.values(pathSel).some(Boolean);
      const msg = pathSel.unsure ? "✨ We'll show you jobs and career paths!" : (pathSel.now&&pathSel.career) ? "✨ Great — we'll give you results for both!" : "";
      const go = () => {
        const goals = pathSel.unsure ? ["now","career"] : Object.keys(pathSel).filter(k=>pathSel[k]);
        if (goals.length) onNext(goals);
      };
      return (
        <>
          <div style={{display:"grid", gap:10, marginBottom:8}}>
            {cards.map(card => (
              <div key={card.key} onClick={()=>toggle(card.key)} style={{border:`2px solid ${pathSel[card.key]?ckCol[card.key]:C.sand}`, borderRadius:14, padding:"15px 13px", cursor:"pointer", background:pathSel[card.key]?(card.key==="now"?"#FEF3EC":card.key==="career"?"#EFF7F2":C.bll):C.warm, position:"relative", transition:"all 0.18s"}}>
                {pathSel[card.key] && <span style={{position:"absolute",top:10,right:10,width:17,height:17,background:ckCol[card.key],color:"#fff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700}}>✓</span>}
                <div style={{fontSize:22,marginBottom:6}}>{card.icon}</div>
                <h3 style={{fontFamily:"'Fraunces',serif",fontSize:15,fontWeight:400,marginBottom:3}}>{card.title}</h3>
                <p style={{fontSize:12,color:C.mid,lineHeight:1.4}}>{card.desc}</p>
              </div>
            ))}
          </div>
          <div style={{textAlign:"center",fontSize:13,color:C.gr,minHeight:18,marginBottom:14,fontStyle:"italic",fontWeight:500}}>{msg}</div>
          <div style={{display:"flex",gap:12,alignItems:"center",justifyContent:"flex-end",marginTop:4}}>
            {onBack && <button style={{background:"none",border:"none",fontSize:14,color:C.lt,cursor:"pointer",padding:"8px 10px",fontFamily:"'DM Sans',sans-serif"}} onClick={onBack}>← Back</button>}
            <button disabled={!hasAny} onClick={go} style={{background:hasAny?C.tc:C.sand,color:hasAny?"#fff":C.lt,border:"none",borderRadius:50,padding:"12px 28px",fontSize:14,fontWeight:600,cursor:hasAny?"pointer":"not-allowed",fontFamily:"'DM Sans',sans-serif",opacity:hasAny?1:0.5}}>Continue →</button>
          </div>
        </>
      );
    }

    if (q.type === "multi") {
      const toggle = v => setMultiSel(prev => { const n={...prev}; const count = Object.values(n).filter(Boolean).length; if (n[v]) { delete n[v]; return n; } if (count < maxSel) { n[v]=true; } return n; });
      const hasAny = Object.values(multiSel).some(Boolean);
      const count = Object.values(multiSel).filter(Boolean).length;
      return (
        <>
          <p style={{fontSize:12,color:C.lt,marginBottom:10,fontStyle:"italic"}}>
            {maxSel < 99 ? `Pick up to ${maxSel} — ${count} selected` : "Pick all that apply — there's no wrong answer."}
          </p>
          <div style={{display:"grid",gridTemplateColumns:cols===2?"1fr 1fr":"1fr",gap:8,marginBottom:20}}>
            {opts.map(opt => <OptBtn key={opt.v} opt={opt} selected={!!multiSel[opt.v]} onClick={toggle} />)}
          </div>
          <div style={{display:"flex",gap:12,alignItems:"center",justifyContent:"flex-end",marginTop:4}}>
            {onBack && <button style={{background:"none",border:"none",fontSize:14,color:C.lt,cursor:"pointer",padding:"8px 10px",fontFamily:"'DM Sans',sans-serif"}} onClick={onBack}>← Back</button>}
            <button disabled={!hasAny} onClick={()=>{if(hasAny)onNext(Object.keys(multiSel).filter(k=>multiSel[k]));}} style={{background:hasAny?C.tc:C.sand,color:hasAny?"#fff":C.lt,border:"none",borderRadius:50,padding:"12px 28px",fontSize:14,fontWeight:600,cursor:hasAny?"pointer":"not-allowed",fontFamily:"'DM Sans',sans-serif",opacity:hasAny?1:0.5}}>Continue →</button>
          </div>
        </>
      );
    }

    if (q.type === "options") {
      return (
        <>
          <div style={{display:"grid",gridTemplateColumns:cols===2?"1fr 1fr":"1fr",gap:8,marginBottom:20}}>
            {opts.map(opt => <OptBtn key={opt.v} opt={opt} selected={singleSel===opt.v} onClick={v=>setSingleSel(v)} />)}
          </div>
          <div style={{display:"flex",gap:12,alignItems:"center",justifyContent:"flex-end",marginTop:4}}>
            {onBack && <button style={{background:"none",border:"none",fontSize:14,color:C.lt,cursor:"pointer",padding:"8px 10px",fontFamily:"'DM Sans',sans-serif"}} onClick={onBack}>← Back</button>}
            <button disabled={!singleSel} onClick={()=>{if(singleSel)onNext(singleSel);}} style={{background:singleSel?C.tc:C.sand,color:singleSel?"#fff":C.lt,border:"none",borderRadius:50,padding:"12px 28px",fontSize:14,fontWeight:600,cursor:singleSel?"pointer":"not-allowed",fontFamily:"'DM Sans',sans-serif",opacity:singleSel?1:0.5}}>Continue →</button>
          </div>
        </>
      );
    }

    if (q.type === "text") {
      return (
        <>
          <input type="text" autoFocus value={textVal} onChange={e=>setTextVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&textVal.trim())onNext(textVal.trim());}} placeholder={q.ph||""} style={{width:"100%",background:C.warm,border:`2px solid ${C.sand}`,borderRadius:12,padding:"11px 14px",fontSize:15,color:C.ch,outline:"none",fontFamily:"'DM Sans',sans-serif",marginBottom:16,height:50}} />
          <div style={{display:"flex",gap:12,alignItems:"center",justifyContent:"flex-end"}}>
            {onBack && <button style={{background:"none",border:"none",fontSize:14,color:C.lt,cursor:"pointer",padding:"8px 10px",fontFamily:"'DM Sans',sans-serif"}} onClick={onBack}>← Back</button>}
            <button disabled={!textVal.trim()} onClick={()=>{if(textVal.trim())onNext(textVal.trim());}} style={{background:textVal.trim()?C.tc:C.sand,color:textVal.trim()?"#fff":C.lt,border:"none",borderRadius:50,padding:"12px 28px",fontSize:14,fontWeight:600,cursor:textVal.trim()?"pointer":"not-allowed",fontFamily:"'DM Sans',sans-serif",opacity:textVal.trim()?1:0.5}}>Continue →</button>
          </div>
        </>
      );
    }
    return null;
  }

  // ─────────────────────────────────────────────
  // SAFE SCREEN
  // ─────────────────────────────────────────────
  if (phase === "safe") {
    return (
      <Shell>
        <div style={{textAlign:"center",padding:"8px 0 16px"}}>
          <div style={{fontSize:44,marginBottom:12}}>🧭</div>
          <h2 style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(17px,3vw,24px)",fontWeight:400,marginBottom:8}}>
            Your journey starts here
          </h2>
          <p style={{fontSize:14,color:C.mid,lineHeight:1.6,maxWidth:360,margin:"0 auto 16px"}}>
            We'll take you through <strong>3 phases</strong> of questions — each one building a richer picture of who you are and what you need.
          </p>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:20}}>
            {PHASES.map((p,i) => (
              <div key={p.id} style={{flex:1,maxWidth:160,background:C.warm,border:`1.5px solid ${C.sand}`,borderRadius:11,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontSize:20,marginBottom:4}}>{p.emoji}</div>
                <div style={{fontSize:11,fontWeight:700,color:C.mid,marginBottom:2}}>Phase {i+1}</div>
                <div style={{fontSize:12,color:C.lt,lineHeight:1.3}}>{p.label}</div>
              </div>
            ))}
          </div>
          {[
            ["✅","No right or wrong answers","We're not testing you — just getting to know you."],
            ["⏱️","Take as long as you need","No timer. Go at your own pace."],
            ["💛","Not knowing is totally normal","Most Explorers your age are still figuring it out."],
            ["🔒","Your answers stay private","Only used to find your matches. Never stored."],
          ].map(([icon,strong,span]) => (
            <div key={strong} style={{display:"flex",alignItems:"flex-start",gap:10,background:C.warm,border:`1.5px solid ${C.sand}`,borderRadius:11,padding:"9px 12px",textAlign:"left",marginBottom:8,maxWidth:380,margin:"0 auto 8px"}}>
              <span style={{fontSize:15,flexShrink:0,marginTop:1}}>{icon}</span>
              <div><strong style={{display:"block",fontSize:13,marginBottom:1}}>{strong}</strong><span style={{fontSize:11,color:C.mid,lineHeight:1.4}}>{span}</span></div>
            </div>
          ))}
          <button onClick={()=>goTo(0)} style={{display:"block",width:"100%",maxWidth:260,margin:"20px auto 0",background:C.tc,color:"#fff",border:"none",borderRadius:50,padding:"13px 28px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            Begin Phase 1 →
          </button>
        </div>
      </Shell>
    );
  }

  // ─────────────────────────────────────────────
  // QUESTION PHASE
  // ─────────────────────────────────────────────
  if (phase === "questions") {
    const q = qList[qIdx];
    if (!q) return null;
    const phaseObj = PHASES.find(p => p.id === q.phase);
    const pct = (qIdx / TOTAL) * 92;
    const onBack = (() => {
      if (qIdx === 0) return () => { scrollToTop(); setPhase("safe"); };
      // If prev question is in a different phase, go back to that phase's celebration
      const prevQ = qList[qIdx - 1];
      const thisQ = qList[qIdx];
      if (prevQ && thisQ && prevQ.phase !== thisQ.phase) {
        return () => { scrollToTop(); setShowCelebration(prevQ.phase); setPhase("celebration"); };
      }
      return () => { scrollToTop(); resetInput(); setQIdx(qIdx - 1); };
    })();
    const onNext = val => saveAndAdvance(q.id, val);

    return (
      <Shell>
        {phaseObj && (
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:C.warm,border:`1.5px solid ${C.sand}`,borderRadius:20,padding:"4px 12px",marginBottom:14,fontSize:12,color:C.mid,fontWeight:500}}>
            <span>{phaseObj.emoji}</span>
            <span>Phase {PHASES.findIndex(p=>p.id===phaseObj.id)+1}: {phaseObj.label}</span>
          </div>
        )}
        <ProgBar pct={pct} label={q.label} step={qIdx+1} total={TOTAL} />
        <p style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(17px,2.6vw,23px)",fontWeight:400,lineHeight:1.35,marginBottom:6}}>{q.q}</p>
        {q.hint && <p style={{fontSize:13,color:C.lt,marginBottom:16,fontStyle:"italic",lineHeight:1.5}}>{q.hint}</p>}
        {renderQBody(q, onNext, onBack)}
      </Shell>
    );
  }

  // ─────────────────────────────────────────────
  // PHASE CELEBRATION
  // ─────────────────────────────────────────────
  if (phase === "celebration") {
    const phaseObj = PHASES.find(p => p.id === showCelebration);
    if (!phaseObj) { afterCelebration(); return null; }
    return (
      <Shell>
        <PhaseCelebration phase={phaseObj} name={name} onContinue={afterCelebration} />
      </Shell>
    );
  }

  // ─────────────────────────────────────────────
  // THINKING
  // ─────────────────────────────────────────────
  if (phase === "thinking") {
    return (
      <Shell>
        <div style={{height:8,background:C.sand,borderRadius:8,overflow:"hidden",marginBottom:20}}>
          <div style={{height:"100%",background:`linear-gradient(90deg,${C.tc},${C.tcl})`,borderRadius:8,width:"95%",transition:"width 0.5s ease"}} />
        </div>
        <div style={{textAlign:"center",padding:"20px 16px"}}>
          <ThinkDots />
          <p style={{fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:300,color:C.mid,fontStyle:"italic"}}>
            Finding your matches, {name}…
          </p>
          <small style={{display:"block",marginTop:8,fontSize:12,color:C.lt}}>{thinkMsg}</small>
        </div>
      </Shell>
    );
  }

  // ─────────────────────────────────────────────
  // RESULTS
  // ─────────────────────────────────────────────
  if (phase === "results" && results) {
    const { encouragement, summary, nowJobs, careerJobs, tips, wN, wC } = results;
    return (
      <Shell>
        <div style={{height:8,background:C.sand,borderRadius:8,overflow:"hidden",marginBottom:16}}>
          <div style={{height:"100%",background:`linear-gradient(90deg,${C.tc},${C.tcl})`,borderRadius:8,width:"100%"}} />
        </div>
        <div style={{textAlign:"center",marginBottom:16}}>
          <h2 style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(19px,3.5vw,26px)",fontWeight:300,marginBottom:4}}>Your matches, {name} 🎉</h2>
          <p style={{fontSize:14,color:C.mid}}>{summary}</p>
        </div>
        {encouragement && (
          <div style={{background:"linear-gradient(135deg,#FEF8EC,#FEF3E6)",border:"1.5px solid #F5DDB8",borderRadius:13,padding:"14px 16px",marginBottom:16,display:"flex",gap:10,alignItems:"flex-start"}}>
            <span style={{fontSize:17,flexShrink:0,marginTop:2}}>💛</span>
            <p style={{fontSize:14,color:"#7A5C35",lineHeight:1.65,fontStyle:"italic"}}>{encouragement}</p>
          </div>
        )}
        {wN && nowJobs && nowJobs.length > 0 && (
          <>
            <div style={{display:"flex",alignItems:"center",gap:8,margin:"18px 0 10px",paddingBottom:8,borderBottom:`1.5px solid ${C.sand}`}}>
              <span>💵</span>
              <h3 style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:400}}>Jobs you can start now</h3>
              <span style={{marginLeft:"auto",fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"2px 8px",borderRadius:20,background:"#EFF7F2",color:C.gr}}>Start now</span>
            </div>
            {nowJobs.map((j,i) => <JobCard key={i} job={j} rank={i+1} type="now" />)}
          </>
        )}
        {wC && careerJobs && careerJobs.length > 0 && (
          <>
            <div style={{display:"flex",alignItems:"center",gap:8,margin:"22px 0 10px",paddingBottom:8,borderBottom:`1.5px solid ${C.sand}`}}>
              <span>🚀</span>
              <h3 style={{fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:400}}>Future career paths</h3>
              <span style={{marginLeft:"auto",fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"2px 8px",borderRadius:20,background:"#FEF3EC",color:C.tc}}>Career path</span>
            </div>
            {careerJobs.map((j,i) => <JobCard key={i} job={j} rank={i+1} type="career" />)}
          </>
        )}
        {tips && tips.length > 0 && (
          <div style={{marginTop:16,background:"linear-gradient(135deg,#F8F4EF,#EFF6F2)",borderRadius:13,padding:"15px 17px"}}>
            <h4 style={{fontFamily:"'Fraunces',serif",fontSize:14,fontWeight:400,marginBottom:8}}>✦ Your next steps</h4>
            {tips.map((t,i) => (
              <div key={i} style={{fontSize:14,color:C.mid,paddingLeft:16,position:"relative",lineHeight:1.5,marginBottom:5}}>
                <span style={{position:"absolute",left:0,color:C.tc}}>→</span>{t}
              </div>
            ))}
          </div>
        )}

        {/* Phase 4 teaser */}
        <div style={{marginTop:14,background:`linear-gradient(135deg,${C.pul},#EFF7F2)`,border:`1.5px solid #C9B8E8`,borderRadius:13,padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:20}}>✨</span>
            <strong style={{fontSize:13,fontWeight:700,color:C.pu}}>Coming soon — Phase 4: Your Roadmap</strong>
          </div>
          <p style={{fontSize:13,color:"#6B5A8A",lineHeight:1.5}}>CV Builder, job application templates, interview prep, and a personalised action plan — all built from your Explorer profile.</p>
        </div>

        <div style={{marginTop:12,background:C.bll,border:"1.5px solid #C8D7F5",borderRadius:13,padding:"13px 16px",display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:22}}>🗂️</span>
          <div>
            <strong style={{display:"block",fontSize:13,fontWeight:700,color:C.bl,marginBottom:2}}>Coming soon — CV Builder</strong>
            <p style={{fontSize:12,color:"#6B80B8",lineHeight:1.4}}>We'll use your Explorer profile to draft a personalised CV and cover letter, ready to send.</p>
          </div>
        </div>

        <button onClick={startApp} style={{display:"block",width:"100%",marginTop:12,background:"none",border:`1.5px solid ${C.sand}`,borderRadius:50,padding:11,fontSize:14,color:C.mid,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",textAlign:"center"}}>
          ↺ Start again with different answers
        </button>

        <div style={{marginTop:16,background:C.warm,border:`1px solid ${C.sand}`,borderRadius:11,padding:"12px 15px"}}>
          <p style={{fontSize:11,color:C.lt,lineHeight:1.6,marginBottom:3}}>⚠️ <strong>For guidance only.</strong> Career Compass is not a substitute for professional career counselling.</p>
          <p style={{fontSize:11,color:C.lt,lineHeight:1.6,marginBottom:3}}>🔒 <strong>Privacy:</strong> Your answers are processed by Anthropic's AI to generate results and are not stored after your session.</p>
          <p style={{fontSize:11,color:C.lt,lineHeight:1.6}}>👤 <strong>Under 15?</strong> Please let a parent or guardian know you're using this tool.</p>
        </div>
      </Shell>
    );
  }

  // ─────────────────────────────────────────────
  // ERROR
  // ─────────────────────────────────────────────
  if (phase === "error") {
    return (
      <Shell>
        <div style={{textAlign:"center",padding:"20px 8px"}}>
          <div style={{fontSize:28,marginBottom:9}}>🔧</div>
          <h3 style={{fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:400,marginBottom:6}}>Something didn't quite work</h3>
          <p style={{fontSize:14,color:C.mid,lineHeight:1.6,marginBottom:12}}>The AI ran into a hiccup. This is usually temporary — hit Try Again.</p>
          {errorMsg && <div style={{background:"#FFF5F5",border:"1px solid #FFCDD2",borderRadius:8,padding:"8px 11px",fontSize:11,color:"#B04040",textAlign:"left",marginBottom:12,fontFamily:"monospace",wordBreak:"break-all"}}>{errorMsg}</div>}
          <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:10}}>
            <button onClick={()=>runResults(answers,qList)} style={{background:C.tc,color:"#fff",border:"none",borderRadius:50,padding:"12px 28px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Try again →</button>
          </div>
          <button onClick={startApp} style={{display:"block",width:"100%",background:"none",border:`1.5px solid ${C.sand}`,borderRadius:50,padding:11,fontSize:14,color:C.mid,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",textAlign:"center"}}>↺ Start over</button>
        </div>
      </Shell>
    );
  }

  return null;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CareerCompass />);
</script>
</body>
</html>
